<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>慢性病處方箋管理</title>
<style>
  :root {
    --primary: #1a56a0;
    --primary-light: #ebf3ff;
    --success: #1a7a4a;
    --success-light: #e8f7ee;
    --warning: #92600a;
    --warning-light: #fef7e6;
    --danger: #c0392b;
    --danger-light: #fdf0ef;
    --gray-50: #f8fafc;
    --gray-100: #f0f4f8;
    --gray-200: #e2e8f0;
    --gray-400: #94a3b8;
    --gray-500: #64748b;
    --gray-700: #334155;
    --gray-900: #0f172a;
    --radius: 14px;
    --shadow: 0 2px 8px rgba(0,0,0,0.08);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: 'Noto Sans TC', 'PingFang TC', sans-serif; background: var(--gray-100); min-height: 100vh; color: var(--gray-900); }

  .page { display: none; padding: 16px; max-width: 480px; margin: 0 auto; }
  .page.active { display: block; }

  /* Header */
  .header { background: var(--primary); border-radius: var(--radius); padding: 18px 20px; margin-bottom: 16px; color: white; display: flex; justify-content: space-between; align-items: center; }
  .header-left .label { font-size: 11px; opacity: 0.75; margin-bottom: 3px; }
  .header-left .title { font-size: 18px; font-weight: 700; }
  .header-left .subtitle { font-size: 11px; opacity: 0.6; margin-top: 3px; }
  .header-btn { background: rgba(255,255,255,0.18); border: none; border-radius: 8px; color: white; padding: 7px 13px; font-size: 12px; cursor: pointer; }

  /* Card */
  .card { background: white; border-radius: var(--radius); padding: 18px 20px; margin-bottom: 12px; box-shadow: var(--shadow); }
  .card-title { font-size: 13px; font-weight: 700; color: var(--gray-700); margin-bottom: 10px; }

  /* Settings */
  .field-group { padding: 10px 0; border-bottom: 1px solid var(--gray-200); }
  .field-group:last-child { border-bottom: none; }
  .field-label { font-size: 11px; color: var(--gray-400); margin-bottom: 5px; }
  .field-input { width: 100%; padding: 9px 12px; border: 1.5px solid var(--gray-200); border-radius: 9px; font-size: 14px; outline: none; transition: border 0.2s; }
  .field-input:focus { border-color: var(--primary); }

  /* Upload area */
  .upload-area { border: 2px dashed var(--gray-200); border-radius: 12px; padding: 24px; text-align: center; cursor: pointer; transition: border 0.2s; }
  .upload-area:active { border-color: var(--primary); }
  .upload-area img { max-height: 220px; max-width: 100%; border-radius: 8px; }
  .upload-icon { font-size: 40px; margin-bottom: 10px; }
  .upload-text { font-size: 14px; color: var(--gray-400); }
  .upload-hint { font-size: 12px; color: var(--gray-400); margin-top: 8px; }

  /* Buttons */
  .btn { width: 100%; padding: 14px; border-radius: 12px; border: none; font-size: 15px; font-weight: 700; cursor: pointer; transition: opacity 0.2s, background 0.3s; margin-bottom: 10px; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-primary { background: var(--primary); color: white; }
  .btn-success { background: #1a7a4a; color: white; }
  .btn-success.done { background: #2d9e61; }
  .btn-outline { background: white; color: var(--gray-700); border: 2px solid var(--gray-200); }

  /* Loading */
  .loading-card { text-align: center; padding: 50px 20px; }
  .loading-icon { font-size: 36px; margin-bottom: 14px; animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .loading-title { font-size: 16px; font-weight: 600; color: var(--primary); margin-bottom: 6px; }
  .loading-sub { font-size: 13px; color: var(--gray-400); }

  /* Info rows */
  .info-row { padding: 9px 0; border-bottom: 1px solid var(--gray-100); }
  .info-row:last-child { border-bottom: none; }
  .info-row-label { font-size: 11px; color: var(--gray-400); margin-bottom: 3px; }
  .info-row-value { display: flex; align-items: center; gap: 8px; }
  .info-row-text { font-size: 13px; color: var(--gray-900); flex: 1; line-height: 1.5; }
  .edit-btn { background: var(--gray-100); border: none; border-radius: 6px; padding: 3px 9px; font-size: 12px; color: var(--gray-500); cursor: pointer; white-space: nowrap; flex-shrink: 0; }
  .edit-area { width: 100%; padding: 7px 10px; border: 2px solid var(--primary); border-radius: 8px; font-size: 13px; outline: none; font-family: inherit; resize: vertical; }
  .edit-btns { display: flex; gap: 8px; margin-top: 6px; }
  .edit-confirm { flex: 1; background: var(--primary); color: white; border: none; border-radius: 8px; padding: 8px; font-size: 13px; font-weight: 600; cursor: pointer; }
  .edit-cancel { flex: 1; background: var(--gray-200); color: var(--gray-700); border: none; border-radius: 8px; padding: 8px; font-size: 13px; font-weight: 600; cursor: pointer; }

  /* Refill timeline */
  .refill-item { border-radius: 10px; padding: 11px 14px; margin-bottom: 8px; border: 2px solid; }
  .refill-item.current { border-color: #3182ce; background: #ebf8ff; }
  .refill-item.done { border-color: #48bb78; background: #f0fff4; }
  .refill-item.pending { border-color: var(--gray-200); background: var(--gray-50); }
  .refill-title { font-size: 12px; font-weight: 600; margin-bottom: 4px; }
  .refill-item.current .refill-title { color: #2b6cb0; }
  .refill-item.done .refill-title { color: #276749; }
  .refill-item.pending .refill-title { color: var(--gray-500); }
  .badge { display: inline-block; font-size: 10px; padding: 1px 7px; border-radius: 4px; margin-left: 6px; font-weight: 600; }
  .badge-current { background: #3182ce; color: white; }
  .badge-done { color: #48bb78; }

  /* Medications */
  .med-item { border-left: 3px solid var(--primary); padding-left: 13px; margin-bottom: 14px; }
  .med-name { font-size: 14px; font-weight: 600; color: var(--gray-900); }
  .med-code { font-size: 11px; color: var(--gray-400); margin: 2px 0 6px; }
  .med-tags { display: flex; gap: 6px; flex-wrap: wrap; }
  .med-tag { background: var(--gray-50); border: 1px solid var(--gray-200); border-radius: 6px; padding: 2px 9px; font-size: 12px; color: var(--gray-700); }

  /* Alert */
  .alert { border-radius: 12px; padding: 13px 18px; margin-bottom: 12px; font-size: 13px; }
  .alert-warning { background: var(--warning-light); border: 1px solid #f6d860; color: var(--warning); }
  .alert-danger { background: var(--danger-light); border: 1px solid #f5a9a3; color: var(--danger); }
  .alert-success { background: var(--success-light); border: 1px solid #86efac; color: var(--success); }

  /* Patient header card */
  .patient-card { background: white; border-radius: var(--radius); padding: 18px 20px; margin-bottom: 12px; box-shadow: var(--shadow); }
  .patient-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
  .patient-name { font-size: 22px; font-weight: 700; }
  .patient-meta { font-size: 13px; color: var(--gray-500); margin-top: 3px; }
  .refill-badge { background: var(--primary-light); color: var(--primary); border-radius: 20px; padding: 5px 14px; font-size: 12px; font-weight: 700; white-space: nowrap; }
  .patient-info { border-top: 1px solid var(--gray-100); padding-top: 10px; font-size: 13px; color: var(--gray-700); }
  .patient-info div { margin-bottom: 4px; line-height: 1.5; }
</style>
</head>
<body>

<!-- Settings Page -->
<div class="page active" id="page-settings">
  <div class="header">
    <div class="header-left">
      <div class="label">慢性病處方箋管理系統</div>
      <div class="title">初始設定</div>
    </div>
  </div>

  <!-- Model Selection -->
  <div class="card">
    <div class="card-title">🤖 選擇辨識模型</div>
    <div style="display:flex;flex-direction:column;gap:8px;margin-top:4px;">
      <label id="label-gemini" style="display:flex;align-items:center;gap:12px;padding:12px;border-radius:10px;border:2px solid var(--primary);background:var(--primary-light);cursor:pointer;">
        <input type="radio" name="model" value="gemini" id="radio-gemini" style="width:18px;height:18px;accent-color:var(--primary);">
        <div>
          <div style="font-size:14px;font-weight:600;color:var(--primary);">Google Gemini</div>
          <div style="font-size:11px;color:var(--gray-500);">免費額度大，速度快</div>
        </div>
      </label>
      <label id="label-claude" style="display:flex;align-items:center;gap:12px;padding:12px;border-radius:10px;border:2px solid var(--gray-200);background:white;cursor:pointer;">
        <input type="radio" name="model" value="claude" id="radio-claude" style="width:18px;height:18px;accent-color:var(--primary);">
        <div>
          <div style="font-size:14px;font-weight:600;color:var(--gray-700);">Claude (Anthropic)</div>
          <div style="font-size:11px;color:var(--gray-500);">準確率最高，需付費</div>
        </div>
      </label>
      <label id="label-ollama" style="display:flex;align-items:center;gap:12px;padding:12px;border-radius:10px;border:2px solid var(--gray-200);background:white;cursor:pointer;">
        <input type="radio" name="model" value="ollama" id="radio-ollama" style="width:18px;height:18px;accent-color:var(--primary);">
        <div>
          <div style="font-size:14px;font-weight:600;color:var(--gray-700);">Qwen3 VL (Ollama)</div>
          <div style="font-size:11px;color:var(--gray-500);">本地執行，完全免費私密</div>
        </div>
      </label>
    </div>
  </div>

  <!-- API Keys -->
  <div class="card" id="card-gemini-key">
    <div class="card-title">🔑 Gemini API Key</div>
    <div class="field-group">
      <div class="field-label">API Key</div>
      <input class="field-input" type="password" id="geminiKey" placeholder="AIza...">
    </div>
    <div class="field-group" style="border:none;">
      <div class="field-label">Gemini 模型</div>
      <input class="field-input" type="text" id="geminiModel" placeholder="gemini-2.0-flash-exp">
    </div>
  </div>

  <div class="card" id="card-claude-key" style="display:none;">
    <div class="card-title">🔑 Anthropic API Key</div>
    <div class="field-group" style="border:none;">
      <div class="field-label">API Key</div>
      <input class="field-input" type="password" id="claudeKey" placeholder="sk-ant-api03-...">
    </div>
  </div>

  <div class="card" id="card-ollama-url" style="display:none;">
    <div class="card-title">🔗 Ollama 設定</div>
    <div class="field-group">
      <div class="field-label">Ollama URL（Spark IP）</div>
      <input class="field-input" type="text" id="ollamaUrl" placeholder="https://pixels-guards-spin-photograph.trycloudflare.com">
    </div>
    <div class="field-group" style="border:none;">
      <div class="field-label">模型名稱</div>
      <input class="field-input" type="text" id="ollamaModel" placeholder="qwen2.5vl:7b">
    </div>
  </div>

  <!-- Webhook -->
  <div class="card">
    <div class="card-title">☁️ Make Webhook</div>
    <div class="field-group" style="border:none;">
      <div class="field-label">Webhook URL</div>
      <input class="field-input" type="text" id="webhookUrl" value="https://hook.us2.make.com/9iuqdis82n7nsjpgbdqipr3zjkv05s6e">
    </div>
  </div>

  <button class="btn btn-primary" id="btnSaveSettings">儲存並開始使用 →</button>
  <button class="btn btn-outline" id="testBtn">🔍 測試 Gemini 並列出可用模型</button>
  <div id="modelList" style="display:none;background:white;border-radius:12px;padding:14px;margin-bottom:12px;font-size:12px;color:#334155;line-height:1.8;"></div>
  <div style="font-size:12px;color:var(--gray-400);text-align:center;">設定儲存在瀏覽器本地，不會傳送給任何人</div>
</div>

<!-- OCR Page -->
<div class="page" id="page-ocr">
  <div class="header">
    <div class="header-left">
      <div class="label">全民健康保險</div>
      <div class="title">掃描處方箋</div>
    </div>
    <button class="header-btn" id="btnToSettings">⚙️ 設定</button>
  </div>
  <input type="file" id="fileCamera" accept="image/*" capture="environment" style="display:none" onchange="handleFile(event)">
  <input type="file" id="fileGallery" accept="image/*" style="display:none" onchange="handleFile(event)">

  <div style="display:flex;gap:10px;margin-bottom:12px;">
    <button id="btnCamera" style="flex:1;padding:12px;border-radius:12px;border:1.5px solid var(--primary);background:white;color:var(--primary);font-size:14px;font-weight:600;cursor:pointer;">📷 拍照</button>
    <button id="btnGallery" style="flex:1;padding:12px;border-radius:12px;border:1.5px solid var(--primary);background:white;color:var(--primary);font-size:14px;font-weight:600;cursor:pointer;">🖼️ 從相簿選取</button>
  </div>

  <div class="card">
    <div id="uploadPlaceholder" style="text-align:center;padding:20px 0;">
      <div style="font-size:40px;margin-bottom:8px;">🧾</div>
      <div style="font-size:14px;color:var(--gray-400);">照片會顯示在這裡</div>
    </div>
    <img id="previewImg" style="display:none;max-width:100%;border-radius:8px;">
    <div class="upload-hint" id="uploadHint" style="display:none;text-align:center;margin-top:8px;font-size:12px;color:var(--gray-400);">重新選擇請點上方按鈕</div>
  </div>
  <div class="alert alert-danger" id="ocrError" style="display:none"></div>
  <button class="btn btn-primary" id="ocrBtn" disabled>🔍 開始辨識</button>
</div>

<!-- Loading Page -->
<div class="page" id="page-loading">
  <div class="header">
    <div class="header-left">
      <div class="label">全民健康保險</div>
      <div class="title">慢性病連續處方箋</div>
    </div>
  </div>
  <div class="card loading-card">
    <div class="loading-icon">🔍</div>
    <div class="loading-title">AI 辨識中</div>
    <div class="loading-sub">正在讀取處方箋資料...</div>
  </div>
</div>

<!-- Result Page -->
<div class="page" id="page-result">
  <div class="header">
    <div class="header-left">
      <div class="label">辨識結果</div>
      <div class="title">請確認並儲存</div>
    </div>
    <button class="header-btn" id="btnBackToOcr">← 重新掃描</button>
  </div>

  <div class="patient-card" id="patientCard"></div>
  <div class="card" id="patientEditCard"></div>
  <div class="card" id="clinicCard"></div>
  <div class="card" id="refillCard"></div>
  <div class="card" id="medCard"></div>
  <div class="card" id="expireCard"></div>
  <div class="alert" id="saveMsg" style="display:none"></div>
  <button class="btn btn-success" id="saveBtn">💾 儲存至 Airtable</button>
  <button class="btn btn-outline" id="btnNextScan">📷 掃描下一張</button>
</div>

<script>
const PROMPT = `這是一張台灣全民健康保險門診慢性病連續處方箋，可能來自診所或醫院，格式因院所不同而有差異。

請仔細辨識整張處方箋，找出以下資訊（不要假設固定欄位位置，依實際內容判讀）：
1. 人名、身分證、出生日期（民國年格式，完整抄錄，人名逐字確認不可替換相似字）
2. 院所名稱、醫師姓名、就醫日期
3. 回診日（一般處方箋欄位的「回診日」，通常比截止日晚一天）、截止日（連續處方箋欄位的「截止日」）、給藥日份
4. 可調劑總次數，以及每次的領藥日期：第1次通常是單一日期（就醫當天），第2、3次是日期區間（格式如115/03/24～115/03/28），請完整抄錄區間不可只寫單一日期
5. 已完成調劑的次數（有蓋章、批價、藥師簽名或數字標記者視為已完成）
6. 藥品清單：每筆藥品的代碼、名稱、劑量、用法、天數、總數量。用量欄位格式為「數量/單位　用法」，例如「2.00/ 錠　PO TID」表示劑量2錠、用法PO TID
7. 診斷或疾病分類（完整抄錄不可截斷）

回傳JSON，只有JSON，無其他文字：
{
  "patient_name": "病患姓名",
  "patient_gender": "性別",
  "patient_id": "身分證字號",
  "patient_dob": "出生日期民國年完整格式",
  "clinic_name": "院所名稱",
  "doctor_name": "醫師姓名",
  "visit_date": "就醫日期民國年格式",
  "return_date": "回診日",
  "expire_date": "截止日",
  "days_supply": 給藥日份數字,
  "total_refills": 可調劑總次數數字,
  "current_refill": 目前最新已完成的調劑次數數字,
  "refill_schedule": [
    {"times": 1, "date_range": "第1次領藥日期或區間", "completed": true或false},
    {"times": 2, "date_range": "第2次領藥日期區間", "completed": true或false},
    {"times": 3, "date_range": "第3次領藥日期區間", "completed": true或false}
  ],
  "medications": [
    {"code": "藥品代碼", "name": "藥品名稱", "dose": "劑量含單位", "frequency": "用法", "days": 天數數字, "quantity": 總數量數字, "unit": "單位"}
  ],
  "diagnosis": "診斷或疾病分類"
}`;

let currentResult = null;
let currentB64 = null;
let saved = false;

function saveSettings() {
  const model = document.querySelector('input[name="model"]:checked')?.value || 'gemini';
  const webhook = document.getElementById('webhookUrl').value.trim();
  localStorage.setItem('selectedModel', model);
  localStorage.setItem('webhookUrl', webhook);
  if (model === 'gemini') {
    const key = document.getElementById('geminiKey').value.trim();
    const gmodel = document.getElementById('geminiModel').value.trim() || 'gemini-2.0-flash-exp';
    if (!key) { alert('請填入 Gemini API Key'); return; }
    localStorage.setItem('geminiKey', key);
    localStorage.setItem('geminiModel', gmodel);
  } else if (model === 'claude') {
    const key = document.getElementById('claudeKey').value.trim();
    if (!key) { alert('請填入 Anthropic API Key'); return; }
    localStorage.setItem('claudeKey', key);
  } else if (model === 'ollama') {
    const url = document.getElementById('ollamaUrl').value.trim();
    const omodel = document.getElementById('ollamaModel').value.trim() || 'qwen3vl:latest';
    if (!url) { alert('請填入 Ollama URL'); return; }
    localStorage.setItem('ollamaUrl', url);
    localStorage.setItem('ollamaModel', omodel);
  }
  showPage('ocr');
}

function selectModel(modelId) {
  localStorage.setItem('geminiModel', modelId);
  const url = `https://generativelanguage.googleapis.com/v1beta/models/${modelId}:generateContent`;
  // Update the fetch URL in memory
  window._geminiUrl = url;
  document.getElementById('modelList').innerHTML += `<div style="margin-top:8px;padding:8px;background:#e8f7ee;border-radius:8px;color:#276749;font-weight:600;">✅ 已選擇：${modelId}</div>`;
}

async function testAPIKey() {
  const key = document.getElementById('geminiKey').value.trim();
  if (!key) { alert('請先填入 API Key'); return; }
  const btn = document.getElementById('testBtn');
  btn.textContent = '⏳ 查詢中...';
  btn.disabled = true;
  try {
    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${key}`);
    const data = await res.json();
    const div = document.getElementById('modelList');
    if (data.error) {
      div.innerHTML = '❌ 錯誤：' + data.error.message;
    } else {
      const vision = data.models.filter(m => m.supportedGenerationMethods?.includes('generateContent'));
      div.innerHTML = '✅ 點選模型即可使用：';
      const ul = document.createElement('div');
      ul.style.marginTop = '8px';
      vision.forEach(m => {
        const modelId = m.name.replace('models/','');
        const btn = document.createElement('button');
        btn.textContent = modelId;
        btn.style.cssText = 'display:block;width:100%;text-align:left;background:#f0f4f8;border:1px solid #e2e8f0;border-radius:8px;padding:8px 12px;margin-bottom:6px;font-size:12px;cursor:pointer;color:#334155;';
        btn.addEventListener('click', function() { selectModel(modelId); });
        ul.appendChild(btn);
      });
      div.appendChild(ul);
    }
    div.style.display = 'block';
  } catch(e) {
    document.getElementById('modelList').innerHTML = '❌ ' + e.message;
    document.getElementById('modelList').style.display = 'block';
  }
  btn.textContent = '🔍 測試 API Key 並列出可用模型';
  btn.disabled = false;
}

function renderExpireCard() {
  const r = currentResult;
  document.getElementById('expireCard').innerHTML = `
    <div class="card-title">⚠️ 回診 / 截止日期</div>
    <div class="info-row">
      <div class="info-row-label">回診日</div>
      <div class="info-row-value">
        <span class="info-row-text" id="val-return_date">${formatDate(r.return_date) || '—'}</span>
        <button class="edit-btn" onclick="editDateField('return_date')">✏️ 修改</button>
      </div>
    </div>
    <div class="info-row">
      <div class="info-row-label">截止日</div>
      <div class="info-row-value">
        <span class="info-row-text" id="val-expire_date">${formatDate(r.expire_date) || '—'}</span>

      <button onclick="renderRefillCard()" style="flex:1;background:#e2e8f0;color:#4a5568;border:none;border-radius:8px;padding:8px;font-size:13px;font-weight:600;cursor:pointer;">✕ 取消</button>

function confirmRefill(times) {

function renderExpireCard() {

}

// Event delegation for all dynamic buttons
document.addEventListener('click', function(e) {
  const btn = e.target.closest('button');
  if (!btn) return;

  // Edit button
  if (btn.hasAttribute('data-key') && !btn.hasAttribute('data-confirm') && !btn.hasAttribute('data-cancel')) {
    const key = btn.getAttribute('data-key');
    const multiline = btn.getAttribute('data-multiline') === 'true';
    startEdit(key, multiline);
    return;
  }
  // Confirm edit
  if (btn.hasAttribute('data-confirm')) {
    confirmEdit(btn.getAttribute('data-confirm'));
    return;
  }
  // Cancel edit
  if (btn.hasAttribute('data-cancel')) {
    cancelEdit(btn.getAttribute('data-cancel'));
    return;
  }
});

  document.getElementById('card-gemini-key').style.display = model === 'gemini' ? 'block' : 'none';

function loadSettings() {
  const selectedModel = localStorage.getItem('selectedModel') || 'gemini';
  const webhook = localStorage.getItem('webhookUrl') || 'https://hook.us2.make.com/9iuqdis82n7nsjpgbdqipr3zjkv05s6e';

  document.getElementById('ollamaModel').value = localStorage.getItem('ollamaModel') || 'qwen2.5vl:7b';

function showPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  window.scrollTo(0, 0);
}

function handleFile(e) {
  const file = e.target.files[0];
  if (!file) return;
  // Reset input so same file can be re-selected
  e.target.value = '';
  const reader = new FileReader();
  reader.onload = ev => {
    const dataUrl = ev.target.result;
    currentB64 = dataUrl.split(',')[1];
    document.getElementById('uploadPlaceholder').style.display = 'none';
    const img = document.getElementById('previewImg');
    img.src = dataUrl;
    img.style.display = 'block';
    document.getElementById('uploadHint').style.display = 'block';
    document.getElementById('ocrBtn').disabled = false;
    document.getElementById('ocrError').style.display = 'none';
  };
  reader.readAsDataURL(file);
}

async function callGemini() {
  const key = localStorage.getItem('geminiKey');
  if (!key) throw new Error('請先設定 Gemini API Key');
  const model = localStorage.getItem('geminiModel') || 'gemini-3-pro-image-preview';
  const url = window._geminiUrl || `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent`;
  const res = await fetch(`${url}?key=${key}`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      contents: [{ parts: [
        { inline_data: { mime_type: 'image/jpeg', data: currentB64 } },
        { text: PROMPT }
      ]}],
      generationConfig: { temperature: 0, maxOutputTokens: 2000 }
    })
  });
  const data = await res.json();
  if (data.error) throw new Error(`API錯誤 ${data.error.code}：${data.error.message}`);
  const text = data.candidates?.[0]?.content?.parts?.[0]?.text || '';
  if (!text) throw new Error('Gemini 未回傳內容');
  return text;
}

async function callClaude() {
  const key = localStorage.getItem('claudeKey');
  if (!key) throw new Error('請先設定 Anthropic API Key');
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': key,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-calls': 'true'
    },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 2000,
      messages: [{ role: 'user', content: [
        { type: 'image', source: { type: 'base64', media_type: 'image/jpeg', data: currentB64 } },
        { type: 'text', text: PROMPT }
      ]}]
    })
  });
  const data = await res.json();
  if (data.error) throw new Error(`API錯誤：${data.error.message}`);
  const text = data.content?.[0]?.text || '';
  if (!text) throw new Error('Claude 未回傳內容');
  return text;
}

async function callOllama() {
  const baseUrl = (localStorage.getItem('ollamaUrl') || '').replace(/\/+$/, '');
  const model = localStorage.getItem('ollamaModel') || 'qwen2.5vl:7b';
  if (!baseUrl) throw new Error('請先設定 Ollama URL');
  const endpoint = `${baseUrl}/api/generate`;
  let res, data;
  try {
    res = await fetch(endpoint, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: model,
        prompt: PROMPT,
        images: [currentB64],
        stream: false
      })
    });
  } catch(e) {
    throw new Error(`連線失敗 (${endpoint})：${e.message}`);
  }
  try {
    data = await res.json();
  } catch(e) {
    throw new Error(`回傳格式錯誤 HTTP ${res.status}`);
  }
  if (data.error) throw new Error(`Ollama 錯誤：${data.error}`);
  if (!data.response) throw new Error(`Ollama 無回應，HTTP ${res.status}，內容：${JSON.stringify(data).slice(0,100)}`);
  return data.response;
}

function extractJSON(text) {
  let jsonStr = text.trim();
  const match = jsonStr.match(/```(?:json)?\s*([\s\S]*?)```/);
  if (match) jsonStr = match[1].trim();
  const start = jsonStr.indexOf('{');
  const end = jsonStr.lastIndexOf('}');
  if (start === -1 || end === -1) throw new Error('無法找到 JSON 資料，請重試');
  return JSON.parse(jsonStr.slice(start, end + 1));
}

async function runOCR() {
  const selectedModel = localStorage.getItem('selectedModel') || 'gemini';
  showPage('loading');
  try {
    let text;
    if (selectedModel === 'gemini') text = await callGemini();
    else if (selectedModel === 'claude') text = await callClaude();
    else if (selectedModel === 'ollama') text = await callOllama();
    currentResult = extractJSON(text);
    saved = false;
    renderResult();
    showPage('result');
  } catch(err) {
    showPage('ocr');
    document.getElementById('ocrError').textContent = '辨識失敗：' + err.message;
    document.getElementById('ocrError').style.display = 'block';
  }
}

function makeRow(label, key, multiline) {
  const val = currentResult[key] != null ? String(currentResult[key]) : '';
  return `<div class="info-row" id="row-${key}">
    <div class="info-row-label">${label}</div>
    <div class="info-row-value">
      <span class="info-row-text" id="val-${key}">${val || '—'}</span>
      <button class="edit-btn" data-key="${key}" data-multiline="${multiline||false}">✏️ 修改</button>
    </div>
  </div>`;
}

function startEdit(key, multiline) {
  const val = currentResult[key] != null ? String(currentResult[key]) : '';
  const row = document.getElementById('row-' + key);
  const inputHtml = multiline
    ? `<textarea class="edit-area" id="edit-${key}" rows="3">${val}</textarea>`
    : `<input class="edit-area" id="edit-${key}" value="${val}">`;
  row.querySelector('.info-row-value').innerHTML = `
    ${inputHtml}
    <div class="edit-btns">
      <button class="edit-confirm" data-confirm="${key}">✓ 確認</button>
      <button class="edit-cancel" data-cancel="${key}">✕ 取消</button>
    </div>`;
  document.getElementById('edit-' + key).focus();
}

function confirmEdit(key) {
  const input = document.getElementById('edit-' + key);
  if (!input) return;
  const val = input.value;
  currentResult[key] = val;
  const row = document.getElementById('row-' + key);
  row.querySelector('.info-row-value').innerHTML = `
    <span class="info-row-text" id="val-${key}">${val || '—'}</span>
    <button class="edit-btn" data-key="${key}" data-multiline="${key==='diagnosis'}">✏️ 修改</button>`;
  if (key === 'patient_name') {
    const nameEl = document.getElementById('disp-patient_name');
    if (nameEl) nameEl.textContent = val;
  }
}

function cancelEdit(key) {
  const val = currentResult[key] != null ? String(currentResult[key]) : '';
  const row = document.getElementById('row-' + key);
  row.querySelector('.info-row-value').innerHTML = `
    <span class="info-row-text" id="val-${key}">${val || '—'}</span>
    <button class="edit-btn" data-key="${key}" data-multiline="${key==='diagnosis'}">✏️ 修改</button>`;
}

async function saveToAirtable() {
  if (saved) return;
  const webhook = localStorage.getItem('webhookUrl');
  if (!webhook) { alert('請先設定 Webhook URL'); return; }
  const btn = document.getElementById('saveBtn');
  btn.disabled = true;
  btn.textContent = '⏳ 儲存中...';
  const msg = document.getElementById('saveMsg');
  try {
    const r = currentResult;
    await fetch(webhook, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        patient_name: r.patient_name || '',
        patient_id: r.patient_id || '',
        patient_gender: r.patient_gender || '',
        patient_dob: r.patient_dob || '',
        clinic_name: r.clinic_name || '',
        doctor_name: r.doctor_name || '',
        visit_date: r.visit_date || '',
        return_date: r.return_date || '',
        expire_date: r.expire_date || '',
        days_supply: r.days_supply || 0,
        total_refills: r.total_refills || 0,
        current_refill: r.current_refill || 0,
        refill_schedule: JSON.stringify(r.refill_schedule || []),
        medications: JSON.stringify(r.medications || []),
        diagnosis: r.diagnosis || ''
      })
    });
    saved = true;
    btn.textContent = '✅ 已儲存至 Airtable';
    btn.className = 'btn btn-success done';
    msg.className = 'alert alert-success';
    msg.textContent = '✅ 資料已成功儲存至 Airtable';
    msg.style.display = 'block';
  } catch(err) {
    btn.disabled = false;
    btn.textContent = '💾 儲存至 Airtable';
    msg.className = 'alert alert-danger';
    msg.textContent = '❌ 儲存失敗：' + err.message;
    msg.style.display = 'block';
  }
}
